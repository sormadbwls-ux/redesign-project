<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>승차권 조회</title>
    <!-- 폰트 및 스타일 연결 -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="ticket-page">
    <!-- 전체 화면을 덮는 어두운 오버레이 배경 -->
    <div class="page-overlay">
      <div class="content-wrapper">
        <!-- [헤더] 타이틀 및 안내 -->
        <header class="ticket-header">
          <div class="h-left">
            <img src="assets/icons/bus_white.png" alt="버스" class="bus-icon" />
            <h2>승차권 조회</h2>
          </div>
          <a href="#" class="info-link">승차홈 위치 안내 &gt;</a>
        </header>

        <!-- [메인] 티켓 컨테이너 -->
        <div class="ticket-container">
          <!-- [왼쪽] QR 및 선물하기 (짙은 브라운) -->
          <div class="ticket-left">
            <div class="qr-area">
              <div class="qr-box">
                <img
                  src="assets/icons/qr_code.png"
                  alt="QR코드"
                  class="qr-img"
                />
                <button class="btn-zoom">
                  <img src="assets/icons/TicketCheck_Btn_zoom.png" alt="" />
                  확대하기
                </button>
              </div>
              <div class="bus-type-info">
                <p>등급 : 우등(프리미엄)</p>
                <p>운행회사 : 금호고속</p>
              </div>
            </div>
            <button class="btn-gift">
              <img src="assets/icons/TicketCheck_Btn_gift.png" alt="" /> 승차권
              선물하기
            </button>
          </div>

          <!-- [오른쪽] 노선 및 상세정보 (오렌지/크림) -->
          <div class="ticket-right">
            <!-- 상단 노선 정보 -->
            <div class="route-section">
              <div class="route-box">
                <div class="city">서울경부</div>
                <div class="arrow">→</div>
                <div class="city">대구</div>
              </div>
              <!-- 배경 일러스트 효과 (CSS로 처리) -->
            </div>

            <!-- 하단 상세 그리드 (짙은 레드 박스) -->
            <div class="detail-grid">
              <div class="info-box">
                <span class="label">출발일</span>
                <strong class="value">2026<br />01.20</strong>
              </div>
              <div class="info-box">
                <span class="label">출발시간</span>
                <strong class="value">23:50</strong>
              </div>
              <div class="info-box">
                <span class="label">승차홈</span>
                <strong class="value">21</strong>
              </div>
              <div class="info-box">
                <span class="label">좌석번호</span>
                <strong class="value">13A</strong>
              </div>
            </div>

            <!-- 우측 바코드 장식 -->
            <div class="ticket-decoration"></div>
          </div>
        </div>

        <!-- [푸터] 액션 버튼 -->
        <div class="action-buttons">
          <button class="btn-edit">변경하기</button>
          <button class="btn-cancel">취소하기</button>
        </div>
      </div>
    </div>
  </body>
</html>
